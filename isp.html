<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Pro | Algorithmic Messages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
        }
        .neon-border {
            border: 1px solid #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }
        .neon-text {
            color: #00f3ff;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }
        .input-dark {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
        }
        .input-dark:focus {
            border-color: #00f3ff;
            outline: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-bold neon-text">MSG_GEN <span class="text-gray-500 text-sm font-mono tracking-widest">v1.0</span></h1>
            <p class="text-gray-400">Generador de plantillas dinámicas por variables.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <section class="space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-400 rounded-full"></span>
                    Configuración
                </h2>
                
                <div>
                    <label class="block text-sm text-gray-500 mb-2 font-mono italic">Defina su estructura:</label>
                    <textarea id="templateInput" class="w-full h-40 p-4 rounded-lg input-dark font-mono text-sm" placeholder="Hola {{nombre}}, te escribo de {{empresa}} para informarte que {{evento}}..."></textarea>
                </div>

                <div id="dynamicFields" class="space-y-3 pt-4 border-t border-gray-800">
                    <p class="text-xs text-gray-600 italic">Escriba variables entre {{ }} para generar inputs.</p>
                </div>
            </section>

            <section class="space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
                    Vista Previa
                </h2>

                <div id="outputContainer" class="w-full h-64 p-6 rounded-lg bg-zinc-900 border border-zinc-800 relative group overflow-auto">
                    <pre id="finalMessage" class="whitespace-pre-wrap font-sans text-gray-300"></pre>
                </div>

                <div class="flex gap-3">
                    <button onclick="copyToClipboard()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 px-4 rounded-lg transition-all border border-zinc-700">
                        Copiar Mensaje
                    </button>
                    <button onclick="clearAll()" class="px-6 py-3 rounded-lg border border-red-900/50 text-red-500 hover:bg-red-950/20 transition-all">
                        Limpiar
                    </button>
                </div>
            </section>

        </div>
    </div>

    <script>
        const templateInput = document.getElementById('templateInput');
        const dynamicFields = document.getElementById('dynamicFields');
        const finalMessage = document.getElementById('finalMessage');

        // Algoritmo de detección de variables y renderizado
        function updateUI() {
            const text = templateInput.value;
            const regex = /{{(.*?)}}/g;
            let match;
            const variables = new Set();

            while ((match = regex.exec(text)) !== null) {
                if (match[1].trim()) variables.add(match[1].trim());
            }

            renderInputs(Array.from(variables));
            generateFinalText();
        }

        function renderInputs(vars) {
            const currentValues = {};
            // Preservar valores actuales antes de redibujar
            document.querySelectorAll('.var-input').forEach(input => {
                currentValues[input.dataset.var] = input.value;
            });

            dynamicFields.innerHTML = vars.length > 0 ? '' : '<p class="text-xs text-gray-600 italic">No se detectaron variables.</p>';
            
            vars.forEach(v => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <label class="block text-xs text-cyan-500 uppercase font-bold mb-1">${v}</label>
                    <input type="text" 
                           data-var="${v}" 
                           value="${currentValues[v] || ''}"
                           class="var-input w-full p-2 rounded bg-zinc-800 border border-zinc-700 focus:border-cyan-500 outline-none text-sm"
                           oninput="generateFinalText()">
                `;
                dynamicFields.appendChild(div);
            });
        }

        function generateFinalText() {
            let text = templateInput.value;
            const inputs = document.querySelectorAll('.var-input');

            inputs.forEach(input => {
                const placeholder = new RegExp(`{{${input.dataset.var}}}`, 'g');
                const val = input.value || `<span class="text-zinc-600">[${input.dataset.var}]</span>`;
                text = text.replace(placeholder, input.value || `[${input.dataset.var}]`);
            });

            finalMessage.textContent = text;
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(finalMessage.textContent);
            alert("¡Mensaje copiado!");
        }

        function clearAll() {
            templateInput.value = '';
            updateUI();
        }

        templateInput.addEventListener('input', updateUI);
    </script>
</body>
</html>

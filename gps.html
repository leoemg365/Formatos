<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLocator Pro con Mapa</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
        }

        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; color: var(--primary); }

        /* Estilos del Contenedor del Mapa */
        #map {
            height: 300px; /* Altura del mapa */
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid #334155;
            background: #0f172a; /* Color de carga */
        }

        .display {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            border: 1px solid #334155;
            text-align: center;
            min-height: 24px;
        }

        .status {
            font-size: 0.85rem;
            margin-bottom: 1rem;
            color: #94a3b8;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 0.5rem;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .btn-get { background: var(--primary); color: white; }
        .btn-get:hover { background: #1d4ed8; }

        .btn-copy { 
            background: #10b981; 
            color: white; 
            display: none; /* Se activa al detectar ubicación */
        }
        .btn-copy:hover { background: #059669; }

        .error { color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <h1>GeoLocator Pro</h1>
    
    <div id="map"></div>

    <div id="status" class="status">Listo para detectar</div>
    
    <div class="display" id="result">- , -</div>

    <button class="btn-get" onclick="getLocation()">Obtener Mi Ubicación</button>
    <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copiar Coordenadas</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    const resultDiv = document.getElementById('result');
    const statusDiv = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');
    
    // VARIABLES DEL MAPA
    let map;
    let marker;

    // Inicializar el mapa centrado en el mundo
    function initMap() {
        // 'map' es el ID del div, [0, 0] son lat/lon inicial, 2 es el zoom
        map = L.map('map').setView([0, 0], 2);

        // Añadir las "tiles" (imágenes) de OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
    }

    // Ejecutar inicialización al cargar la página
    initMap();

    function getLocation() {
        statusDiv.innerText = "Solicitando permiso y señal GPS...";
        statusDiv.classList.remove('error');

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const precision = pos.coords.accuracy;
                    
                    // FORMATO UNIFICADO (para texto)
                    const unifiedCoords = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                    resultDiv.innerText = unifiedCoords;
                    
                    // ACTUALIZAR MAPA
                    // Centrar vista en el punto con zoom alto (16)
                    map.setView([lat, lon], 16);

                    // Si ya hay un marcador, quitarlo
                    if (marker) {
                        map.removeLayer(marker);
                    }

                    // Añadir nuevo marcador con un popup
                    marker = L.marker([lat, lon]).addTo(map)
                        .bindPopup(`<b>Estás aquí</b><br>Precisión: ${precision.toFixed(0)}m`)
                        .openPopup();
                    
                    statusDiv.innerText = `¡Ubicación detectada! (Precisión: ${precision.toFixed(0)} metros)`;
                    copyBtn.style.display = "block";
                },
                (err) => {
                    statusDiv.innerText = "Error: Permiso denegado o GPS sin señal.";
                    statusDiv.classList.add('error');
                    console.error(err);
                },
                { 
                    enableHighAccuracy: true, // Forzar uso de GPS si está disponible
                    timeout: 10000,           // Esperar máximo 10 seg
                    maximumAge: 0             // No usar ubicación cacheada
                }
            );
        } else {
            statusDiv.innerText = "Navegador no compatible.";
        }
    }

    function copyToClipboard() {
        const textToCopy = resultDiv.innerText;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "¡Copiado!";
            copyBtn.style.background = "#059669";
            
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.background = "#10b981";
            }, 2000);
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLocator Simple</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 320px;
        }

        .display {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            border: 1px solid #334155;
            min-height: 24px;
        }

        .status {
            font-size: 0.85rem;
            margin-bottom: 1rem;
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 0.5rem;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .btn-get { background: var(--primary); color: white; }
        .btn-get:hover { background: #1d4ed8; }

        .btn-copy { 
            background: #10b981; 
            color: white; 
            display: none; /* Se activa al detectar ubicación */
        }
        .btn-copy:hover { background: #059669; }

        .error { color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="status">Listo para detectar</div>
    
    <div class="display" id="result">- , -</div>

    <button class="btn-get" onclick="getLocation()">Obtener Coordenadas</button>
    <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copiar Datos Unificados</button>
</div>

<script>
    const resultDiv = document.getElementById('result');
    const statusDiv = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');

    function getLocation() {
        statusDiv.innerText = "Solicitando permiso...";
        statusDiv.classList.remove('error');

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude.toFixed(6);
                    const lon = pos.coords.longitude.toFixed(6);
                    
                    // Mostramos el formato unificado
                    resultDiv.innerText = `${lat}, ${lon}`;
                    
                    statusDiv.innerText = "¡Ubicación detectada!";
                    copyBtn.style.display = "block";
                },
                (err) => {
                    statusDiv.innerText = "Error: Permiso denegado";
                    statusDiv.classList.add('error');
                },
                { enableHighAccuracy: true }
            );
        } else {
            statusDiv.innerText = "No compatible con navegador";
        }
    }

    function copyToClipboard() {
        const textToCopy = resultDiv.innerText;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "¡Copiado!";
            copyBtn.style.background = "#059669";
            
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.background = "#10b981";
            }, 2000);
        });
    }
</script>

</body>
</html>

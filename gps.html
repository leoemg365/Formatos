<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLocator Pro + Maps Card</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --google-maps: #34a853;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        h1 { margin-top: 0; font-size: 1.4rem; text-align: center; color: var(--primary); }

        #map {
            height: 250px;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #334155;
        }

        .status {
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 0.5rem;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .btn-get { background: var(--primary); color: white; }
        .btn-get:hover { background: #1d4ed8; }

        .btn-copy { background: #10b981; color: white; display: none; }

        /* --- ESTILOS DE LA NUEVA TARJETA DE GOOGLE MAPS --- */
        .maps-card {
            display: none; /* Se muestra al obtener ubicación */
            background: #ffffff;
            color: #1f2937;
            padding: 15px;
            border-radius: 1rem;
            margin-top: 20px;
            text-decoration: none;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 6px solid var(--google-maps);
        }

        .maps-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .maps-card-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .maps-icon {
            font-size: 2rem;
        }

        .maps-text b { color: var(--google-maps); display: block; margin-bottom: 2px; }
        .maps-text span { font-family: monospace; font-size: 0.9rem; color: #4b5563; }

        .error { color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <h1>GeoLocator Pro</h1>
    <div id="map"></div>
    <div id="status" class="status">Listo para detectar</div>
    <button class="btn-get" onclick="getLocation()">Obtener Mi Ubicación</button>
    <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copiar Coordenadas</button>
</div>

<a id="googleMapsCard" href="#" target="_blank" class="maps-card">
    <div class="maps-card-content">
        <div class="maps-icon">📍</div>
        <div class="maps-text">
            <b>Abrir en Google Maps</b>
            <span id="coordDisplay">0.000, 0.000</span>
        </div>
    </div>
</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, marker;
    const statusDiv = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');
    const mapsCard = document.getElementById('googleMapsCard');
    const coordDisplay = document.getElementById('coordDisplay');

    // Inicializar mapa vacío
    function init() {
        map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }
    init();

    function getLocation() {
        statusDiv.innerText = "Solicitando permiso...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const latFixed = lat.toFixed(6);
                const lonFixed = lon.toFixed(6);

                // 1. Actualizar Mapa
                map.setView([lat, lon], 16);
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map).bindPopup("¡Estás aquí!").openPopup();

                // 2. Actualizar Botón Copiar
                copyBtn.style.display = "block";
                copyBtn.setAttribute('data-coords', `${latFixed}, ${lonFixed}`);

                // 3. ACTUALIZAR TARJETA GOOGLE MAPS
                coordDisplay.innerText = `${latFixed}, ${lonFixed}`;
                mapsCard.href = `https://www.google.com/maps?q=${latFixed},${lonFixed}`;
                mapsCard.style.display = "block";

                statusDiv.innerText = "Ubicación detectada correctamente.";
            }, 
            (err) => {
                statusDiv.innerText = "Error al obtener ubicación.";
                statusDiv.classList.add('error');
            }, 
            { enableHighAccuracy: true });
        }
    }

    function copyToClipboard() {
        const text = copyBtn.getAttribute('data-coords');
        navigator.clipboard.writeText(text).then(() => {
            const oldText = copyBtn.innerText;
            copyBtn.innerText = "¡Copiado!";
            setTimeout(() => copyBtn.innerText = oldText, 2000);
        });
    }
</script>

</body>
</html>

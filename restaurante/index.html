<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Cargando...</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" id="fonts-link">
    <!-- Styles -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Navigation -->
    <nav id="navbar">
        <div class="container nav-content">
            <a href="#" class="logo" id="logo">Cargando...</a>
            <ul class="nav-links" id="nav-links">
                <li><a href="#home">Inicio</a></li>
                <li><a href="#specials">Especiales</a></li>
                <li><a href="#menu">Menú</a></li>
                <li><a href="#about">Nosotros</a></li>
                <li><a href="#reservations">Reservas</a></li>
            </ul>
            <div class="nav-actions">
                <a href="#reservations" class="btn desktop-btn" style="padding: 0.6rem 1.5rem; font-size: 0.7rem;">Reservar</a>
                <button class="hamburger" id="hamburger" aria-label="Abrir menú">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <p id="hero-subtitle"></p>
            <h1 id="hero-title"></h1>
            <a id="hero-btn" href="#menu" class="btn"></a>
        </div>
    </section>

    <!-- Specials Section -->
    <section class="section-padding" id="specials">
        <div class="container">
            <div class="text-center">
                <span class="section-subtitle" id="specials-subtitle"></span>
                <h2 class="section-title" id="specials-title"></h2>
            </div>
            <div class="specials-grid" id="specials-grid">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <!-- Menu Section -->
    <section class="section-padding" id="menu" style="background-color: var(--bg-accent);">
        <div class="container">
            <div class="text-center">
                <span class="section-subtitle" id="menu-subtitle"></span>
                <h2 class="section-title" id="menu-title"></h2>
            </div>

            <div class="menu-tabs" id="menu-tabs">
                <!-- Injected via JS -->
            </div>

            <div class="menu-items" id="menu-items">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section class="section-padding" id="about">
        <div class="container">
            <div class="about-content">
                <div class="about-text reveal" id="about-text-container">
                    <span class="section-subtitle" id="about-subtitle"></span>
                    <h2 class="section-title" id="about-title"></h2>
                    <!-- Paragraphs injected via JS -->
                    <a id="about-btn" href="#" class="btn"></a>
                </div>
                <div class="about-image reveal">
                    <img id="about-image" src="" alt="Atmosphere">
                </div>
            </div>
        </div>
    </section>

    <!-- Reservation Section -->
    <section class="section-padding" id="reservations" style="background-color: var(--bg-accent);">
        <div class="container">
            <div class="text-center">
                <span class="section-subtitle" id="res-subtitle"></span>
                <h2 class="section-title" id="res-title"></h2>
            </div>

            <form class="reservation-form reveal" id="reservation-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="people">Personas</label>
                        <select id="people" required>
                            <option value="1">1 Persona</option>
                            <option value="2" selected>2 Personas</option>
                            <option value="4">4 Personas</option>
                            <option value="6">6+ Personas</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="message">Peticiones Especiales</label>
                    <textarea id="message" rows="3"></textarea>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn" id="res-btn"></button>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col" id="footer-brand">
                    <a href="#" class="logo" id="footer-logo"></a>
                    <p style="margin-top: 1rem;" id="footer-desc"></p>
                </div>
                <div class="footer-col" id="footer-location">
                    <h4>Ubicación</h4>
                    <!-- Injected via JS -->
                </div>
                <div class="footer-col" id="footer-hours">
                    <h4>Horario</h4>
                    <!-- Injected via JS -->
                </div>
                <div class="footer-col" id="footer-socials">
                    <h4>Síguenos</h4>
                    <!-- Injected via JS -->
                </div>
            </div>
            <div class="footer-bottom" id="footer-bottom">
            </div>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
